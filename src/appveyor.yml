image:
- Visual Studio 2022
#- macOS
environment:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
build_script:
- pwsh: |
    if ($isWindows) {
      Invoke-WebRequest "https://dot.net/v1/dotnet-install.ps1" -OutFile "./dotnet-install.ps1"
      ./dotnet-install.ps1 -JSonFile global.json -Architecture x64 -InstallDir 'C:\Program Files\dotnet'
    }
    else {
      Invoke-WebRequest "https://dot.net/v1/dotnet-install.sh" -OutFile "./dotnet-install.sh"
      sudo chmod u+x dotnet-install.sh
      sudo ./dotnet-install.sh --jsonfile global.json --architecture x64 --install-dir '/usr/local/share/dotnet'
      sudo ./dotnet-install.sh --version 9.0.314 --architecture x64 --install-dir '/usr/local/share/dotnet'
    }
- pwsh: |
    dotnet build src --configuration Release
    if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
    # xunit.v3 runs on Microsoft.Testing.Platform (opted into via global.json). It ships its own
    # reporters, so the flag is --report-xunit-trx: the VSTest --logger trx does not apply, and
    # --report-trx is the Microsoft TRX extension that xunit.v3 does not bundle.
    dotnet test src --configuration Release --no-build --no-restore --report-xunit-trx
    $testExit = $LASTEXITCODE
    $url = "https://ci.appveyor.com/api/testresults/mstest/$($env:APPVEYOR_JOB_ID)"
    Get-ChildItem -Recurse -Filter *.trx | ForEach-Object {
      Write-Host "Uploading test results: $($_.FullName)"
      try { (New-Object System.Net.WebClient).UploadFile($url, $_.FullName) }
      catch { Write-Host "Failed to upload test results: $_" }
    }
    if ($testExit -ne 0) { exit $testExit }
test: off
on_failure:
  - ps: |
      $root = (Get-Location).Path
      Get-ChildItem *.received.* -Recurse | % {
        $rel = $_.FullName.Substring($root.Length + 1)
        Push-AppveyorArtifact $_.FullName -FileName $rel
      }
artifacts:
- path: nugets\*.nupkg